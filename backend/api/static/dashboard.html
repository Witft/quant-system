<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Stock Picks Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #0f1117; color: #e1e4e8; padding: 20px; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 20px; }
.header h1 { font-size: 22px; color: #f0f6fc; }
.stats { display: flex; gap: 12px; }
.stat-card { background: #1c2128; border: 1px solid #30363d; border-radius: 8px; padding: 14px 20px; min-width: 120px; text-align: center; }
.stat-card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; }
.stat-card .value { font-size: 24px; font-weight: 700; color: #58a6ff; margin-top: 4px; }
.grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
.card h2 { font-size: 16px; color: #f0f6fc; margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 12px; text-align: left; font-size: 13px; border-bottom: 1px solid #21262d; }
th { color: #8b949e; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
td { color: #c9d1d9; }
tr:hover td { background: #1c2128; }
.profit { color: #3fb950; }
.loss { color: #f85149; }
.btn-group { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.btn { padding: 6px 14px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all .15s; }
.btn:hover { background: #30363d; }
.btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
canvas { max-height: 300px; }
.empty { color: #8b949e; font-style: italic; padding: 40px 0; text-align: center; }
</style>
</head>
<body>
<div class="header">
  <h1>📈 价值投资每日扫盘 · 看板</h1>
  <div class="stats" id="stats"></div>
</div>
<div class="grid">
  <div class="card" style="grid-column: 1 / -1;">
    <div class="btn-group">
      <button class="btn active" onclick="loadLatest()">📊 最近推荐</button>
      <button class="btn" onclick="loadAll()">📋 全部记录</button>
    </div>
    <div id="table-container"></div>
  </div>
</div>
<div class="grid" style="margin-top:20px">
  <div class="card">
    <h2>📊 安全边际分布</h2>
    <canvas id="marginChart"></canvas>
  </div>
  <div class="card">
    <h2>📈 ROE vs 负债率</h2>
    <canvas id="roeChart"></canvas>
  </div>
</div>
<script>
const API = '/api';

async function loadStats() {
  const r = await fetch(API + '/stats');
  const s = await r.json();
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="label">📅 扫描天数</div><div class="value">${s.total_days}</div></div>
    <div class="stat-card"><div class="label">🎯 累计推荐</div><div class="value">${s.total_picks}</div></div>
    <div class="stat-card"><div class="label">🏛️ 均安全边际</div><div class="value">${s.avg_margin ? s.avg_margin+'%' : '-'}</div></div>
    <div class="stat-card"><div class="label">📐 均ROE</div><div class="value">${s.avg_roe ? s.avg_roe+'%' : '-'}</div></div>
  `;
}

function renderTable(picks) {
  if (!picks.length) {
    document.getElementById('table-container').innerHTML = '<div class="empty">暂无推荐记录</div>';
    return;
  }
  let html = '<table><thead><tr><th>日期</th><th>代码</th><th>名称</th><th>现价</th><th>PE</th><th>PB</th><th>格雷厄姆</th><th>安全边际</th><th>ROE</th><th>负债率</th><th>建议</th></tr></thead><tbody>';
  for (const p of picks) {
    let ai = {};
    try { ai = JSON.parse(p.ai_structured_json || '{}'); } catch(e) {}
    const rec = ai.recommendation || '-';
    const recColor = rec.includes('回避') || rec.includes('Avoid') ? 'loss' : (rec.includes('买入') || rec.includes('Buy') ? 'profit' : '');
    html += `<tr>
      <td>${p.trade_date}</td>
      <td><code>${p.code}</code></td>
      <td><strong>${p.name || '?'}</strong></td>
      <td>${p.price ? '￥'+p.price : '-'}</td>
      <td>${p.pe || '-'}</td>
      <td>${p.pb || '-'}</td>
      <td>${p.graham ? '￥'+p.graham : '-'}</td>
      <td><span class="${p.margin > 50 ? 'profit' : ''}">${p.margin ? p.margin+'%' : '-'}</span></td>
      <td>${p.roe ? p.roe+'%' : '-'}</td>
      <td>${p.debt_to_assets ? p.debt_to_assets+'%' : '-'}</td>
      <td class="${recColor}">${rec.slice(0, 8)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('table-container').innerHTML = html;
}

let marginChart, roeChart;

function renderCharts(picks) {
  const ctx1 = document.getElementById('marginChart').getContext('2d');
  if (marginChart) marginChart.destroy();
  marginChart = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: picks.map(p => p.name || p.code).slice(0, 20),
      datasets: [{
        label: '安全边际 (%)',
        data: picks.map(p => p.margin).slice(0, 20),
        backgroundColor: picks.map(p => p.margin > 50 ? '#3fb95080' : '#f0883e80').slice(0, 20),
        borderColor: picks.map(p => p.margin > 50 ? '#3fb950' : '#f0883e').slice(0, 20),
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } },
        x: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { display: false } }
      }
    }
  });

  const ctx2 = document.getElementById('roeChart').getContext('2d');
  if (roeChart) roeChart.destroy();
  roeChart = new Chart(ctx2, {
    type: 'scatter',
    data: {
      datasets: [{
        label: '股票',
        data: picks.filter(p => p.debt_to_assets && p.roe).slice(0, 30).map(p => ({
          x: p.debt_to_assets,
          y: p.roe,
          label: p.name || p.code
        })),
        backgroundColor: '#58a6ff',
        pointRadius: 6,
        pointHoverRadius: 8
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        tooltip: {
          callbacks: {
            label: ctx => ctx.raw.label + ': ROE ' + ctx.raw.y + '%, 负债 ' + ctx.raw.x + '%'
          }
        }
      },
      scales: {
        x: { title: { display: true, text: '资产负债率 (%)', color: '#8b949e' }, ticks: { color: '#8b949e' }, grid: { color: '#21262d' } },
        y: { title: { display: true, text: 'ROE (%)', color: '#8b949e' }, ticks: { color: '#8b949e' }, grid: { color: '#21262d' } }
      }
    }
  });
}

async function loadLatest() {
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.btn')[0].classList.add('active');
  const r = await fetch(API + '/picks');
  const data = await r.json();
  renderTable(data.data);
  renderCharts(data.data);
}

async function loadAll() {
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.btn')[1].classList.add('active');
  const r = await fetch(API + '/picks?limit=200');
  const data = await r.json();
  renderTable(data.data);
  renderCharts(data.data);
}

loadStats();
loadLatest();
</script>
</body>
</html>
